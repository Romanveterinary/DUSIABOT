<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дуся - Автоасистент</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ai-radar-layer" style="display: none;">
        <video id="ai-video" autoplay playsinline muted></video>
        <canvas id="ai-canvas"></canvas>
        
        <div id="hood-line">
            <div id="hood-line-text">ЛІНІЯ КАПОТА (Тягни)</div>
        </div>

        <div id="radar-controls">
            <button id="exit-radar-btn">🛑 ВИЙТИ З РАДАРА</button>
            
            <div class="radar-sliders">
                <label>Впевненість ШІ: <span id="ai-sens-val">60%</span></label>
                <input type="range" id="ai-sens-slider" min="30" max="90" step="5" value="60">
                
                <label>Калібрування фокусу: <span id="ai-focal-val">1.0</span></label>
                <input type="range" id="ai-focal-slider" min="0.5" max="3.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <button id="settings-btn" title="Налаштування API">⚙️</button>

    <div id="speed-container">
        <div id="speed-display">0</div>
        <div id="unit">км/год</div>
    </div>
    
    <div id="status-text">Натисніть кнопку для старту</div>
    <button id="dusya-btn">Запустити Дусю</button>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>Налаштування</h2>
            <p>Введіть ваш ключ Gemini API:</p>
            <input type="password" id="api-key-input" placeholder="Вставте ключ сюди...">
            
            <hr style="margin: 15px 0; border-color: #444;">
            
            <h3 style="margin-top: 0; color: #0cf;">ШІ-Радар (Безпека)</h3>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; color: #fff;">
                <input type="checkbox" id="ai-radar-toggle" style="width: 20px; height: 20px; accent-color: #0cf;">
                <span style="font-weight: bold;">Увімкнути ШІ-відеосканер</span>
            </label>
            <div class="modal-buttons">
                <button id="save-settings-btn">Зберегти</button>
                <button id="close-settings-btn">Закрити</button>
            </div>
        </div>
    </div>

    <div id="youtube-player" style="display: none;"></div>
    
    <audio id="keep-alive-audio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

    <script src="app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
