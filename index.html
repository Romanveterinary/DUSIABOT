<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дуся - Автоасистент (HUD)</title>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                for(let reg of regs) { reg.unregister(); }
            });
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css?v=9.0">
</head>
<body>

    <div id="ai-radar-layer" style="display: none;">
        <video id="ai-video" autoplay playsinline muted></video>
        <canvas id="ai-canvas"></canvas>
        <div id="hood-line"><div id="hood-line-text">ЛІНІЯ КАПОТА (Тягни)</div></div>
        <div id="radar-controls">
            <button id="exit-radar-btn">🛑 ВИЙТИ З РАДАРА</button>
        </div>
    </div>

    <button id="settings-btn" class="auto-fade" title="Налаштування API">⚙️</button>

    <div id="hud-center">
        <div id="navigation-container" style="display: none;">
            <div id="nav-arrow" class="static">⬆️</div>
            <div id="nav-distance">-- м</div>
        </div>

        <div id="speed-container">
            <div id="speed-display">0</div>
            <div id="unit">км/год</div>
        </div>
    </div>

    <div id="bottom-hud">
        <button id="dusya-btn" class="auto-fade">Запустити Дусю</button>
        <div id="dusya-glow"></div> 
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>Налаштування</h2>
            <p>Введіть ваш ключ Gemini API:</p>
            <input type="password" id="api-key-input" placeholder="Вставте ключ сюди...">
            <hr style="border-color: #444;">
            <h3 style="margin-top: 0; color: #0cf;">ШІ-Радар (Безпека)</h3>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; color: #fff;">
                <input type="checkbox" id="ai-radar-toggle" style="width: 20px; height: 20px;">
                <span style="font-weight: bold;">Увімкнути ШІ-відеосканер</span>
            </label>
            <hr style="border-color: #444;">
            <h3 style="margin-top: 0; color: #0f0;">📍 Адресна книга</h3>
            <button id="open-map-btn" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #333; color: white; border: 1px solid #0f0; border-radius: 8px; font-size: 16px;">🗺️ Відкрити інтерактивну мапу</button>
            <div class="modal-buttons" style="margin-top: 20px;">
                <button id="save-settings-btn">Зберегти</button>
                <button id="close-settings-btn">Закрити</button>
            </div>
        </div>
    </div>

    <div id="map-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center;">
        <div class="modal-content" style="width: 95%; max-width: 500px; padding: 15px; background: #1a1a1a; border: 2px solid #0cf; border-radius: 15px; display: flex; flex-direction: column;">
            <h2 style="margin-top: 0; color: #0cf; text-align: center;">📍 Ваші точки</h2>
            <div id="leaflet-map" style="width: 100%; height: 40vh; background: #333; border-radius: 8px; margin-bottom: 10px;"></div>
            <p style="font-size: 0.85em; color: #aaa; text-align: center; margin-bottom: 10px;">Натисніть у будь-яке місце на мапі, щоб поставити нову мітку.</p>
            <div id="saved-points-list" style="max-height: 20vh; overflow-y: auto; margin-bottom: 15px; width: 100%;"></div>
            <button id="close-map-btn" style="background: #555; color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; font-size: 18px;">Закрити мапу</button>
        </div>
    </div>

    <audio id="keep-alive-audio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

    <script src="radar.js?v=9.0"></script>
    <script src="navigator.js?v=9.0"></script>
    <script src="dusya-brain.js?v=9.0"></script>
    <script src="app.js?v=9.0"></script>
</body>
</html>
